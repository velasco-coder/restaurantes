<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directorio de Negocios - Manzanillo, Colima</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <h1>Directorio de Negocios Locales</h1>
    <p>Descubre negocios de Manzanillo, Colima, desde una sola URL publica.</p>
  </header>

  <main class="main-container">
    <section class="form-section card">
      <h2 class="section-title" id="form-title">Agregar nuevo negocio</h2>
      <form id="business-form">
        <input type="text" id="name" placeholder="Nombre del negocio" required />
        <input type="text" id="address" placeholder="Direccion (ej. Av. Costera, Manzanillo)" required />
        <input type="text" id="category" placeholder="Categoria (ej. mariscos, tacos, refaccionaria)" required />
        <input type="tel" id="phone" placeholder="Telefono (ej. 3141234567)" required />
        <input type="text" id="hours" placeholder="Horario (ej. 9:00 - 22:00)" required />
        <button type="submit" class="btn-primary">Guardar</button>
      </form>
    </section>

    <section class="filters-section card">
      <input type="text" id="search-input" placeholder="Buscar por nombre o categoria..." />
      <select id="category-filter">
        <option value="">Todas las categorias</option>
      </select>
    </section>

    <section class="business-list-section">
      <h2 class="section-title">Negocios registrados</h2>
      <div id="business-cards" class="business-cards-grid"></div>
    </section>

    <section class="map-section card">
      <h2 class="section-title">Ubicacion en Manzanillo, Colima</h2>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d149338.9390205243!2d-104.4036432!3d19.1112879!2m3!1f0!2f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x842d5d0c1e2a7f8f%3A0x2e6c4f8a6e6c4f8a!2sManzanillo%2C%20Col.!5e0!3m2!1ses-419!2smx!4v1729795200000!5m2!1ses-419!2smx"
        width="100%"
        height="300"
        style="border: 0; border-radius: 8px;"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Directorio local de Manzanillo. Apoya a los negocios de tu comunidad.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
